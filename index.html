<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mine Risk Heatmap — Kharkiv Oblast</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100vh; }
  .legend { background:#fff; padding:8px 10px; border-radius:6px; line-height:1.4; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .legend i { width:14px; height:14px; display:inline-block; margin-right:6px; opacity:.85; }
  .search-control { background:#fff; padding:8px 10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .search-control input, .search-control button, .search-control label { display:block; margin-bottom:6px; width:100%; }
  .search-control input, .search-control button { padding:6px; border:1px solid #ccc; border-radius:4px; }
</style>
</head>
<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Heatmap -->
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
// ===== CONFIG =====
const APPS_SCRIPT_DATA_URL =
  "https://script.google.com/macros/s/AKfycbyiDID7u07n2C8rDc_DIfYYVn6OS-0FaAoLCpNl3jDyi7A2bpZiKJfj62TiwYLvjsWFvw/exec";

const SETTLEMENTS_GEOJSON_URL = "data/kharkiv_settlements_points.geojson";

// ===== HELPERS =====
function normalizeText(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[`ʼ']/g, "’")
    .replace(/\s+/g, " ");
}

function makeKey(raion, hromada, settlement) {
  return [
    normalizeText(raion),
    normalizeText(hromada),
    normalizeText(settlement)
  ].join("||");
}

function safeNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function parseDate(value) {
  if (!value) return null;
  const d = new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

// ===== MAP =====
var map = L.map('map', { zoomControl: true }).setView([49.9935, 36.2304], 8);

var kharkivBounds = L.latLngBounds([[48.5, 34.8], [50.6, 38.3]]);
map.fitBounds(kharkivBounds);

// ===== BASEMAPS =====
var osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom:19, crossOrigin:true, attribution:'&copy; OpenStreetMap' }
);

var carto = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  { maxZoom:20, crossOrigin:true, attribution:'&copy; OpenStreetMap &copy; CARTO' }
);

var osmde = L.tileLayer(
  'https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',
  { maxZoom:19, crossOrigin:true, attribution:'&copy; OpenStreetMap' }
);

osm.addTo(map);

function fallback(fromLayer, toLayer){
  function once(){
    fromLayer.off('tileerror', once);
    if (map.hasLayer(fromLayer)) map.removeLayer(fromLayer);
    toLayer.addTo(map);
  }
  fromLayer.on('tileerror', once);
}
fallback(osm, carto);
fallback(carto, osmde);

var baseLayers = {
  'OpenStreetMap': osm,
  'Carto Voyager': carto,
  'OSM.de': osmde
};

// ===== DEMO CHOROPLETH =====
function color(v){
  return v > 5000 ? '#800026' :
         v > 1000 ? '#BD0026' :
         v > 500  ? '#E31A1C' :
         v > 100  ? '#FC4E2A' :
         v > 50   ? '#FD8D3C' :
         v > 10   ? '#FEB24C' : '#FFEDA0';
}

var choroplethLayer = L.layerGroup();

fetch('data/admin_agg.geojson')
  .then(function(r){ return r.json(); })
  .then(function(geo){
    var layer = L.geoJSON(geo, {
      style: function(f){
        var sumVal = (f.properties && f.properties.sum_participants != null)
          ? f.properties.sum_participants
          : 0;

        return {
          weight: 1,
          color: '#999',
          fillOpacity: 0.7,
          fillColor: color(sumVal || 0)
        };
      },
      onEachFeature: function(f,l){
        var p = f.properties || {};
        var sumVal = (p.sum_participants != null) ? p.sum_participants : 0;
        l.bindPopup(
          '<b>' + (p.hromada || 'Громада') + '</b><br>' +
          'Осіб за період: ' + sumVal +
          '<br><small>Демо-полігон</small>'
        );
      }
    });
    choroplethLayer.addLayer(layer);
  })
  .catch(console.error);

// ===== LIVE DATA =====
var clusterLayer = L.markerClusterGroup();
var heatLayer = null;
var heatProxy = L.layerGroup();

var allSessions = [];
var settlementsLookup = new Map();
var liveRows = [];

function buildSettlementsLookup(settlementsGeo) {
  settlementsLookup.clear();

  (settlementsGeo.features || []).forEach(function(f){
    const p = f.properties || {};
    const geom = f.geometry || {};
    const coords = geom.coordinates;

    if (!coords || geom.type !== "Point") return;

    const key = makeKey(p.raion, p.hromada, p.settlement);

    settlementsLookup.set(key, {
      lat: coords[1],
      lon: coords[0],
      properties: p
    });
  });
}

function convertRowsToFeatures(rows) {
  const features = [];

  rows.forEach(function(row){
    const key = makeKey(row.raion, row.hromada, row.settlement);
    const settlementPoint = settlementsLookup.get(key);

    if (!settlementPoint) {
      console.warn("Не знайдено населений пункт у довіднику:", row);
      return;
    }

    const participantsTotal = safeNumber(row.participants_total);
    const participantsU18 = safeNumber(row.participants_u18);
    const participants18Plus = safeNumber(row.participants_18plus);

    features.push({
      type: "Feature",
      geometry: {
        type: "Point",
        coordinates: [settlementPoint.lon, settlementPoint.lat]
      },
      properties: {
        created_at: row.created_at || "",
        session_date: row.session_date || "",
        raion: row.raion || "",
        hromada: row.hromada || "",
        settlement: row.settlement || "",
        instructor_1: row.instructor_1 || "",
        instructor_2: row.instructor_2 || "",
        participants_total: participantsTotal,
        participants_u18: participantsU18,
        participants_18plus: participants18Plus,
        notes: row.notes || ""
      }
    });
  });

  return features;
}

function buildLayers(features){
  clusterLayer.clearLayers();

  if (heatLayer) {
    heatLayer.setLatLngs([]);
  }

  var geo = { type:'FeatureCollection', features: features };

  var markers = L.geoJSON(geo, {
    pointToLayer: function(f, latlng){
      return L.marker(latlng);
    },
    onEachFeature: function(f, layer){
      var p = f.properties || {};

      var instructors = [p.instructor_1, p.instructor_2]
        .filter(Boolean)
        .join(", ");

      var html =
        '<b>' + (p.settlement || 'Населений пункт') + '</b><br>' +
        (p.hromada || '—') + (p.raion ? ', ' + p.raion : '') + '<br>' +
        'Дата: ' + (p.session_date || '—') + '<br>' +
        'Інструктори: ' + (instructors || '—') + '<br>' +
        'Усього учасників: ' + (p.participants_total ?? '—') + '<br>' +
        'До 18: ' + (p.participants_u18 ?? '—') + '<br>' +
        '18+: ' + (p.participants_18plus ?? '—') +
        (p.notes ? '<br>Примітки: ' + p.notes : '');

      layer.bindPopup(html);
    }
  });

  clusterLayer.addLayer(markers);

  if (typeof L.heatLayer !== 'undefined') {
  var maxParticipants = 0;

  features.forEach(function(f) {
    var p = f.properties || {};
    var val = safeNumber(p.participants_total);
    if (val > maxParticipants) maxParticipants = val;
  });

  if (maxParticipants <= 0) maxParticipants = 1;

  var heatData = features.map(function(f) {
    var c = f.geometry && f.geometry.coordinates;
    var p = f.properties || {};

    if (!c) return null;

    var participants = safeNumber(p.participants_total);

    // динамічна нормалізація по вибірці
var intensity = participants / maxParticipants;
intensity = Math.max(0.15, Math.min(1, intensity));
    return [c[1], c[0], intensity];
  }).filter(Boolean);

if (!heatLayer) {
  heatLayer = L.heatLayer(heatData, {
    radius: 15,
    blur: 45,
    maxZoom: 14,
    minOpacity: 0.38
  });
} else {
  heatLayer.setLatLngs(heatData);
}
  if (map.hasLayer(heatProxy)) {
    if (!map.hasLayer(heatLayer)) {
      heatLayer.addTo(map);
    }
  }
}
}

function populateFilterOptions(features) {
  const instructorSelect = document.getElementById("instructor-filter");
  const raionSelect = document.getElementById("raion-filter");
  const hromadaSelect = document.getElementById("hromada-filter");

  const instructors = new Set();
  const raions = new Set();
  const hromadas = new Set();

  features.forEach(function(f){
    const p = f.properties || {};
    if (p.instructor_1) instructors.add(p.instructor_1);
    if (p.instructor_2) instructors.add(p.instructor_2);
    if (p.raion) raions.add(p.raion);
    if (p.hromada) hromadas.add(p.hromada);
  });

  function fillSelect(select, values, defaultText) {
    select.innerHTML = "";
    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.textContent = defaultText;
    select.appendChild(defaultOption);

    [...values]
      .sort((a, b) => a.localeCompare(b, "uk"))
      .forEach(function(value){
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
  }

  fillSelect(instructorSelect, instructors, "Усі інструктори");
  fillSelect(raionSelect, raions, "Усі райони");
  fillSelect(hromadaSelect, hromadas, "Усі громади");
}

function applyFilters(){
  var txt = (document.getElementById('search-input').value || '').trim().toLowerCase();
  var sVal = document.getElementById('start-date').value;
  var eVal = document.getElementById('end-date').value;
  var selectedInstructor = document.getElementById('instructor-filter').value;
  var selectedRaion = document.getElementById('raion-filter').value;
  var selectedHromada = document.getElementById('hromada-filter').value;

  var sDate = sVal ? new Date(sVal + 'T00:00:00') : null;
  var eDate = eVal ? new Date(eVal + 'T23:59:59.999') : null;

  var filtered = allSessions.filter(function(f){
    var p = f.properties || {};

    var matchSearch =
      !txt ||
      (p.hromada && p.hromada.toLowerCase().includes(txt)) ||
      (p.raion && p.raion.toLowerCase().includes(txt)) ||
      (p.settlement && p.settlement.toLowerCase().includes(txt));

    var d = parseDate(p.session_date);
    var okS = !sDate || (d && d >= sDate);
    var okE = !eDate || (d && d <= eDate);

    var matchInstructor =
      !selectedInstructor ||
      p.instructor_1 === selectedInstructor ||
      p.instructor_2 === selectedInstructor;

    var matchRaion = !selectedRaion || p.raion === selectedRaion;
    var matchHromada = !selectedHromada || p.hromada === selectedHromada;

    return matchSearch && okS && okE && matchInstructor && matchRaion && matchHromada;
  });

  buildLayers(filtered);
}

async function loadLiveSessions(){
  try {
    const [settlementsResponse, sessionsResponse] = await Promise.all([
      fetch(SETTLEMENTS_GEOJSON_URL + '?nocache=' + Date.now()),
      fetch(APPS_SCRIPT_DATA_URL + '?nocache=' + Date.now())
    ]);

    if (!settlementsResponse.ok) {
      throw new Error("Не вдалося завантажити довідник населених пунктів");
    }

    if (!sessionsResponse.ok) {
      throw new Error("Не вдалося завантажити живі дані з Google Sheets");
    }

    const settlementsGeo = await settlementsResponse.json();
    const rows = await sessionsResponse.json();

    buildSettlementsLookup(settlementsGeo);
    liveRows = Array.isArray(rows) ? rows : [];

    allSessions = convertRowsToFeatures(liveRows);
    buildLayers(allSessions);
    populateFilterOptions(allSessions);
  } catch (error) {
    console.error(error);
  }
}

// ===== CONTROLS =====
var searchControl = L.control({ position:'topright' });

searchControl.onAdd = function(){
  var div = L.DomUtil.create('div','search-control');

  div.innerHTML =
    '<input type="text" id="search-input" placeholder="Пошук по району / громаді / НП" />' +
    '<label>Період від: <input type="date" id="start-date" /></label>' +
    '<label>Період до: <input type="date" id="end-date" /></label>' +
    '<label>Інструктор: <select id="instructor-filter"><option value="">Усі інструктори</option></select></label>' +
    '<label>Район: <select id="raion-filter"><option value="">Усі райони</option></select></label>' +
    '<label>Громада: <select id="hromada-filter"><option value="">Усі громади</option></select></label>' +
    '<button id="filter-btn" style="cursor:pointer;">Застосувати фільтри</button>' +
    '<button id="reset-btn" style="cursor:pointer;">Скинути фільтри</button>' +
    '<button id="refresh-btn" style="cursor:pointer;">Оновити дані</button>';

  L.DomEvent.disableClickPropagation(div);
  return div;
};

searchControl.addTo(map);

setTimeout(function(){
  document.getElementById('filter-btn').addEventListener('click', applyFilters);

  document.getElementById('refresh-btn').addEventListener('click', function(){
    loadLiveSessions();
  });

  document.getElementById('reset-btn').addEventListener('click', function(){
    document.getElementById('search-input').value = "";
    document.getElementById('start-date').value = "";
    document.getElementById('end-date').value = "";
    document.getElementById('instructor-filter').value = "";
    document.getElementById('raion-filter').value = "";
    document.getElementById('hromada-filter').value = "";
    buildLayers(allSessions);
  });

  document.getElementById('raion-filter').addEventListener('change', function(){
    const selectedRaion = this.value;
    const hromadaSelect = document.getElementById('hromada-filter');

    const hromadas = new Set();
    allSessions.forEach(function(f){
      const p = f.properties || {};
      if (!selectedRaion || p.raion === selectedRaion) {
        if (p.hromada) hromadas.add(p.hromada);
      }
    });

    hromadaSelect.innerHTML = '<option value="">Усі громади</option>';
    [...hromadas]
      .sort((a, b) => a.localeCompare(b, "uk"))
      .forEach(function(value){
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        hromadaSelect.appendChild(option);
      });
  });
}, 0);

// ===== LAYERS =====
heatProxy.on('add', function(){
  if (heatLayer && !map.hasLayer(heatLayer)) {
    heatLayer.addTo(map);
  }
});

heatProxy.on('remove', function(){
  if (heatLayer && map.hasLayer(heatLayer)) {
    map.removeLayer(heatLayer);
  }
});

var overlays = {
  'Кластер точок': clusterLayer,
  'Heatmap всієї області': heatProxy
};

L.control.layers(baseLayers, overlays, { collapsed:false }).addTo(map);

// default
map.addLayer(clusterLayer);
map.addLayer(heatProxy);


// ===== INIT =====
loadLiveSessions();
</script>
</body>
</html>
