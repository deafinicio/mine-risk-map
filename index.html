<script>
// ===== CONFIG =====
const APPS_SCRIPT_DATA_URL =
  "https://script.google.com/macros/s/AKfycbyiDID7u07n2C8rDc_DIfYYVn6OS-0FaAoLCpNl3jDyi7A2bpZiKJfj62TiwYLvjsWFvw/exec";

const SETTLEMENTS_GEOJSON_URL = "data/kharkiv_settlements_points.geojson";

// ===== HELPERS =====
function normalizeText(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[`ʼ']/g, "’")
    .replace(/\s+/g, " ");
}

function makeKey(raion, hromada, settlement) {
  return [
    normalizeText(raion),
    normalizeText(hromada),
    normalizeText(settlement)
  ].join("||");
}

function safeNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function parseDate(value) {
  if (!value) return null;
  const d = new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

function hslToHex(h, s, l) {
  s /= 100;
  l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n =>
    l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  const toHex = x =>
    Math.round(255 * x).toString(16).padStart(2, "0");
  return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
}

function getHeatGradient() {
  const purple = heatSettings.purpleStrength;
  const purple1 = hslToHex(268, 100, Math.max(28, 58 - purple * 0.20));
  const purple2 = hslToHex(252, 100, Math.max(34, 62 - purple * 0.14));

  return {
    0.03: purple1,
    0.12: purple2,
    0.28: "#4b5dff",
    0.48: "#35c6ff",
    0.68: "#51ff7a",
    0.84: "#ffe14a",
    1.00: "#ff3b30"
  };
}

function downloadBlob(blob, filename) {
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(link.href);
}

// ===== MAP =====
var map = L.map("map", { zoomControl: true }).setView([49.9935, 36.2304], 8);
var kharkivBounds = L.latLngBounds([[48.5, 34.8], [50.6, 38.3]]);
map.fitBounds(kharkivBounds);

// ===== BASEMAPS =====
var osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { maxZoom: 19, crossOrigin: true, attribution: "&copy; OpenStreetMap" }
);

var carto = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
  { maxZoom: 20, crossOrigin: true, attribution: "&copy; OpenStreetMap &copy; CARTO" }
);

var osmde = L.tileLayer(
  "https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png",
  { maxZoom: 19, crossOrigin: true, attribution: "&copy; OpenStreetMap" }
);

osm.addTo(map);

function fallback(fromLayer, toLayer) {
  function once() {
    fromLayer.off("tileerror", once);
    if (map.hasLayer(fromLayer)) {
      map.removeLayer(fromLayer);
    }
    toLayer.addTo(map);
  }
  fromLayer.on("tileerror", once);
}

fallback(osm, carto);
fallback(carto, osmde);

var baseLayers = {
  "OpenStreetMap": osm,
  "Carto Voyager": carto,
  "OSM.de": osmde
};

// ===== LIVE DATA =====
var clusterLayer = L.markerClusterGroup();
var heatLayer = null;
var heatProxy = L.layerGroup();

var allSessions = [];
var currentFeatures = [];
var settlementsLookup = new Map();

const heatSettings = {
  radius: 40,
  blur: 36,
  maxZoom: 12,
  minOpacity: 0.30,
  exponent: 0.42,
  minFloor: 0.10,
  purpleStrength: 78
};

function buildSettlementsLookup(settlementsGeo) {
  settlementsLookup.clear();

  (settlementsGeo.features || []).forEach(function(f) {
    const p = f.properties || {};
    const geom = f.geometry || {};
    const coords = geom.coordinates;

    if (!coords || geom.type !== "Point") return;

    const key = makeKey(p.raion, p.hromada, p.settlement);

    settlementsLookup.set(key, {
      lat: coords[1],
      lon: coords[0],
      properties: p
    });
  });
}

function convertRowsToFeatures(rows) {
  const features = [];

  rows.forEach(function(row) {
    const key = makeKey(row.raion, row.hromada, row.settlement);
    const settlementPoint = settlementsLookup.get(key);

    if (!settlementPoint) {
      console.warn("Не знайдено населений пункт у довіднику:", row);
      return;
    }

    const participantsTotal = safeNumber(row.participants_total);
    const participantsU18 = safeNumber(row.participants_u18);
    const participants18Plus = safeNumber(row.participants_18plus);

    features.push({
      type: "Feature",
      geometry: {
        type: "Point",
        coordinates: [settlementPoint.lon, settlementPoint.lat]
      },
      properties: {
        created_at: row.created_at || "",
        session_date: row.session_date || "",
        raion: row.raion || "",
        hromada: row.hromada || "",
        settlement: row.settlement || "",
        instructor_1: row.instructor_1 || "",
        instructor_2: row.instructor_2 || "",
        participants_total: participantsTotal,
        participants_u18: participantsU18,
        participants_18plus: participants18Plus,
        notes: row.notes || ""
      }
    });
  });

  return features;
}

function buildLayers(features) {
  currentFeatures = features;
  clusterLayer.clearLayers();

  if (heatLayer) {
    heatLayer.setLatLngs([]);
  }

  var geo = {
    type: "FeatureCollection",
    features: features
  };

  var markers = L.geoJSON(geo, {
    pointToLayer: function(f, latlng) {
      return L.marker(latlng);
    },
    onEachFeature: function(f, layer) {
      var p = f.properties || {};

      var instructors = [p.instructor_1, p.instructor_2]
        .filter(Boolean)
        .join(", ");

      var html =
        "<b>" + (p.settlement || "Населений пункт") + "</b><br>" +
        (p.hromada || "—") + (p.raion ? ", " + p.raion : "") + "<br>" +
        "Дата: " + (p.session_date || "—") + "<br>" +
        "Інструктори: " + (instructors || "—") + "<br>" +
        "Усього учасників: " + (p.participants_total ?? "—") + "<br>" +
        "До 18: " + (p.participants_u18 ?? "—") + "<br>" +
        "18+: " + (p.participants_18plus ?? "—") +
        (p.notes ? "<br>Примітки: " + p.notes : "");

      layer.bindPopup(html);
    }
  });

  clusterLayer.addLayer(markers);

  if (typeof L.heatLayer !== "undefined") {
    var maxParticipants = 0;

    features.forEach(function(f) {
      var p = f.properties || {};
      var val = safeNumber(p.participants_total);
      if (val > maxParticipants) maxParticipants = val;
    });

    if (maxParticipants <= 0) {
      maxParticipants = 1;
    }

    var heatData = features.map(function(f) {
      var c = f.geometry && f.geometry.coordinates;
      var p = f.properties || {};

      if (!c) return null;

      var participants = safeNumber(p.participants_total);

      var intensity = Math.pow(
        participants / maxParticipants,
        heatSettings.exponent
      );

      intensity = intensity * heatSettings.purpleStrength / 78;
      intensity = Math.max(
        heatSettings.minFloor,
        Math.min(1, intensity)
      );

      return [c[1], c[0], intensity];
    }).filter(Boolean);

    if (!heatLayer) {
      heatLayer = L.heatLayer(heatData, {
        radius: heatSettings.radius,
        blur: heatSettings.blur,
        maxZoom: heatSettings.maxZoom,
        minOpacity: heatSettings.minOpacity,
        gradient: getHeatGradient()
      });
    } else {
      heatLayer.setLatLngs(heatData);
    }

    if (map.hasLayer(heatProxy)) {
      if (!map.hasLayer(heatLayer)) {
        heatLayer.addTo(map);
      }
    }
  }
}

function populateFilterOptions(features) {
  const instructorSelect = document.getElementById("instructor-filter");
  const raionSelect = document.getElementById("raion-filter");
  const hromadaSelect = document.getElementById("hromada-filter");

  const instructors = new Set();
  const raions = new Set();
  const hromadas = new Set();

  features.forEach(function(f) {
    const p = f.properties || {};
    if (p.instructor_1) instructors.add(p.instructor_1);
    if (p.instructor_2) instructors.add(p.instructor_2);
    if (p.raion) raions.add(p.raion);
    if (p.hromada) hromadas.add(p.hromada);
  });

  function fillSelect(select, values, defaultText) {
    select.innerHTML = "";

    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.textContent = defaultText;
    select.appendChild(defaultOption);

    [...values]
      .sort((a, b) => a.localeCompare(b, "uk"))
      .forEach(function(value) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
  }

  fillSelect(instructorSelect, instructors, "Усі інструктори");
  fillSelect(raionSelect, raions, "Усі райони");
  fillSelect(hromadaSelect, hromadas, "Усі громади");
}

function applyFilters() {
  var txt = (document.getElementById("search-input").value || "").trim().toLowerCase();
  var sVal = document.getElementById("start-date").value;
  var eVal = document.getElementById("end-date").value;
  var selectedInstructor = document.getElementById("instructor-filter").value;
  var selectedRaion = document.getElementById("raion-filter").value;
  var selectedHromada = document.getElementById("hromada-filter").value;

  var sDate = sVal ? new Date(sVal + "T00:00:00") : null;
  var eDate = eVal ? new Date(eVal + "T23:59:59.999") : null;

  var filtered = allSessions.filter(function(f) {
    var p = f.properties || {};

    var matchSearch =
      !txt ||
      (p.hromada && p.hromada.toLowerCase().includes(txt)) ||
      (p.raion && p.raion.toLowerCase().includes(txt)) ||
      (p.settlement && p.settlement.toLowerCase().includes(txt));

    var d = parseDate(p.session_date);
    var okS = !sDate || (d && d >= sDate);
    var okE = !eDate || (d && d <= eDate);

    var matchInstructor =
      !selectedInstructor ||
      p.instructor_1 === selectedInstructor ||
      p.instructor_2 === selectedInstructor;

    var matchRaion = !selectedRaion || p.raion === selectedRaion;
    var matchHromada = !selectedHromada || p.hromada === selectedHromada;

    return matchSearch && okS && okE && matchInstructor && matchRaion && matchHromada;
  });

  buildLayers(filtered);
}

async function loadLiveSessions() {
  try {
    const [settlementsResponse, sessionsResponse] = await Promise.all([
      fetch(SETTLEMENTS_GEOJSON_URL + "?nocache=" + Date.now()),
      fetch(APPS_SCRIPT_DATA_URL + "?nocache=" + Date.now())
    ]);

    if (!settlementsResponse.ok) {
      throw new Error("Не вдалося завантажити довідник населених пунктів");
    }

    if (!sessionsResponse.ok) {
      throw new Error("Не вдалося завантажити живі дані з Google Sheets");
    }

    const settlementsGeo = await settlementsResponse.json();
    const rows = await sessionsResponse.json();

    buildSettlementsLookup(settlementsGeo);
    allSessions = convertRowsToFeatures(Array.isArray(rows) ? rows : []);
    buildLayers(allSessions);
    populateFilterOptions(allSessions);
  } catch (error) {
    console.error(error);
  }
}

// ===== CONTROLS =====
var searchControl = L.control({ position: "topright" });
searchControl.onAdd = function() {
  var div = L.DomUtil.create("div", "control-box");
  div.id = "filters-panel";

  div.innerHTML =
    '<input type="text" id="search-input" placeholder="Пошук по району / громаді / НП" />' +
    '<label>Період від: <input type="date" id="start-date" /></label>' +
    '<label>Період до: <input type="date" id="end-date" /></label>' +
    '<label>Інструктор: <select id="instructor-filter"><option value="">Усі інструктори</option></select></label>' +
    '<label>Район: <select id="raion-filter"><option value="">Усі райони</option></select></label>' +
    '<label>Громада: <select id="hromada-filter"><option value="">Усі громади</option></select></label>' +
    '<button id="filter-btn" style="cursor:pointer;">Застосувати фільтри</button>' +
    '<button id="reset-btn" style="cursor:pointer;">Скинути фільтри</button>' +
    '<button id="refresh-btn" style="cursor:pointer;">Оновити дані</button>' +
    '<div id="export-status" class="export-status"></div>';

  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  return div;
};
searchControl.addTo(map);

// ===== ICONS =====
var topLeftIcons = L.control({ position: "topleft" });
topLeftIcons.onAdd = function() {
  var div = L.DomUtil.create("div", "icon-control");
  div.innerHTML = `
    <button id="toggle-heat-settings" title="Налаштування heatmap">⚙</button>
    <button id="export-png-btn" title="Експорт PNG">📷</button>
    <button id="toggle-filters-btn" title="Показати / сховати фільтри">🧾</button>
  `;
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  return div;
};
topLeftIcons.addTo(map);

// ===== SETTINGS PANEL =====
var heatSettingsControl = L.control({ position: "topleft" });
heatSettingsControl.onAdd = function() {
  var div = L.DomUtil.create("div", "control-box");
  div.style.width = "270px";
  div.id = "heat-settings-panel";
  div.style.display = "none";

  div.innerHTML = `
    <div class="section-title">Heatmap</div>

    <label class="small-label">Radius: <span id="radius-value">${heatSettings.radius}</span></label>
    <input type="range" id="radius-slider" min="10" max="80" step="1" value="${heatSettings.radius}">

    <label class="small-label">Blur: <span id="blur-value">${heatSettings.blur}</span></label>
    <input type="range" id="blur-slider" min="5" max="60" step="1" value="${heatSettings.blur}">

    <label class="small-label">Min opacity: <span id="opacity-value">${heatSettings.minOpacity}</span></label>
    <input type="range" id="opacity-slider" min="0.05" max="0.80" step="0.01" value="${heatSettings.minOpacity}">

    <label class="small-label">Exponent: <span id="exponent-value">${heatSettings.exponent}</span></label>
    <input type="range" id="exponent-slider" min="0.20" max="1.00" step="0.01" value="${heatSettings.exponent}">

    <label class="small-label">Min floor: <span id="floor-value">${heatSettings.minFloor}</span></label>
    <input type="range" id="floor-slider" min="0.01" max="0.40" step="0.01" value="${heatSettings.minFloor}">

    <label class="small-label">Фіолетовий: <span id="purple-value">${heatSettings.purpleStrength}</span></label>
    <input type="range" id="purple-slider" min="30" max="120" step="1" value="${heatSettings.purpleStrength}">

    <button id="reset-heat-settings" style="margin-top:8px; cursor:pointer;">Скинути</button>
  `;

  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);

  var inputs = div.querySelectorAll("input, select, button, label");
  inputs.forEach(function(el) {
    L.DomEvent.on(el, "mousedown", L.DomEvent.stopPropagation);
    L.DomEvent.on(el, "touchstart", L.DomEvent.stopPropagation);
    L.DomEvent.on(el, "pointerdown", L.DomEvent.stopPropagation);
    L.DomEvent.on(el, "dblclick", L.DomEvent.stopPropagation);
    L.DomEvent.on(el, "wheel", L.DomEvent.stopPropagation);
  });

  return div;
};
heatSettingsControl.addTo(map);

function refreshHeatmapSettings() {
  if (currentFeatures.length) {
    if (heatLayer && map.hasLayer(heatLayer)) {
      map.removeLayer(heatLayer);
    }
    heatLayer = null;
    buildLayers(currentFeatures);
  }
}

async function exportMapToPNG() {
  const status = document.getElementById("export-status");
  if (status) status.textContent = "Готую PNG...";

  const heatPanel = document.getElementById("heat-settings-panel");
  const oldDisplay = heatPanel ? heatPanel.style.display : "";

  if (heatPanel) heatPanel.style.display = "none";

  try {
    await new Promise(resolve => setTimeout(resolve, 500));

    const canvas = await html2canvas(document.getElementById("map"), {
      useCORS: true,
      backgroundColor: null,
      logging: false,
      scale: 2
    });

    canvas.toBlob(function(blob) {
      if (!blob) {
        if (status) status.textContent = "Не вдалося створити PNG.";
        return;
      }

      const now = new Date();
      const filename =
        "mine-risk-map-" +
        now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0") + "_" +
        String(now.getHours()).padStart(2, "0") + "-" +
        String(now.getMinutes()).padStart(2, "0") +
        ".png";

      downloadBlob(blob, filename);
      if (status) status.textContent = "PNG експортовано.";
    });
  } catch (error) {
    console.error(error);
    if (status) status.textContent = "Помилка експорту PNG.";
  } finally {
    if (heatPanel) heatPanel.style.display = oldDisplay;
  }
}

setTimeout(function() {
  document.getElementById("toggle-heat-settings").addEventListener("click", function() {
    const panel = document.getElementById("heat-settings-panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
  });

  document.getElementById("toggle-filters-btn").addEventListener("click", function() {
    const panel = document.getElementById("filters-panel");
    panel.classList.toggle("filter-panel-hidden");
  });

  document.getElementById("export-png-btn").addEventListener("click", function() {
    exportMapToPNG();
  });

  document.getElementById("radius-slider").addEventListener("input", function() {
    heatSettings.radius = Number(this.value);
    document.getElementById("radius-value").textContent = this.value;
    refreshHeatmapSettings();
  });

  document.getElementById("blur-slider").addEventListener("input", function() {
    heatSettings.blur = Number(this.value);
    document.getElementById("blur-value").textContent = this.value;
    refreshHeatmapSettings();
  });

  document.getElementById("opacity-slider").addEventListener("input", function() {
    heatSettings.minOpacity = Number(this.value);
    document.getElementById("opacity-value").textContent = this.value;
    refreshHeatmapSettings();
  });

  document.getElementById("exponent-slider").addEventListener("input", function() {
    heatSettings.exponent = Number(this.value);
    document.getElementById("exponent-value").textContent = this.value;
    refreshHeatmapSettings();
  });

  document.getElementById("floor-slider").addEventListener("input", function() {
    heatSettings.minFloor = Number(this.value);
    document.getElementById("floor-value").textContent = this.value;
    refreshHeatmapSettings();
  });

  document.getElementById("purple-slider").addEventListener("input", function() {
    heatSettings.purpleStrength = Number(this.value);
    document.getElementById("purple-value").textContent = this.value;
    refreshHeatmapSettings();
  });

  document.getElementById("reset-heat-settings").addEventListener("click", function() {
    heatSettings.radius = 40;
    heatSettings.blur = 36;
    heatSettings.minOpacity = 0.30;
    heatSettings.exponent = 0.42;
    heatSettings.minFloor = 0.10;
    heatSettings.purpleStrength = 78;

    document.getElementById("radius-slider").value = heatSettings.radius;
    document.getElementById("blur-slider").value = heatSettings.blur;
    document.getElementById("opacity-slider").value = heatSettings.minOpacity;
    document.getElementById("exponent-slider").value = heatSettings.exponent;
    document.getElementById("floor-slider").value = heatSettings.minFloor;
    document.getElementById("purple-slider").value = heatSettings.purpleStrength;

    document.getElementById("radius-value").textContent = heatSettings.radius;
    document.getElementById("blur-value").textContent = heatSettings.blur;
    document.getElementById("opacity-value").textContent = heatSettings.minOpacity;
    document.getElementById("exponent-value").textContent = heatSettings.exponent;
    document.getElementById("floor-value").textContent = heatSettings.minFloor;
    document.getElementById("purple-value").textContent = heatSettings.purpleStrength;

    refreshHeatmapSettings();
  });

  document.getElementById("filter-btn").addEventListener("click", applyFilters);

  document.getElementById("refresh-btn").addEventListener("click", function() {
    loadLiveSessions();
  });

  document.getElementById("reset-btn").addEventListener("click", function() {
    document.getElementById("search-input").value = "";
    document.getElementById("start-date").value = "";
    document.getElementById("end-date").value = "";
    document.getElementById("instructor-filter").value = "";
    document.getElementById("raion-filter").value = "";
    document.getElementById("hromada-filter").value = "";
    buildLayers(allSessions);
  });

  document.getElementById("raion-filter").addEventListener("change", function() {
    const selectedRaion = this.value;
    const hromadaSelect = document.getElementById("hromada-filter");

    const hromadas = new Set();
    allSessions.forEach(function(f) {
      const p = f.properties || {};
      if (!selectedRaion || p.raion === selectedRaion) {
        if (p.hromada) hromadas.add(p.hromada);
      }
    });

    hromadaSelect.innerHTML = '<option value="">Усі громади</option>';
    [...hromadas]
      .sort((a, b) => a.localeCompare(b, "uk"))
      .forEach(function(value) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        hromadaSelect.appendChild(option);
      });
  });
}, 0);

// ===== LAYERS =====
heatProxy.on("add", function() {
  if (heatLayer && !map.hasLayer(heatLayer)) {
    heatLayer.addTo(map);
  }
});

heatProxy.on("remove", function() {
  if (heatLayer && map.hasLayer(heatLayer)) {
    map.removeLayer(heatLayer);
  }
});

var overlays = {
  "Кластер точок": clusterLayer,
  "Heatmap всієї області": heatProxy
};

L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

// ===== DEFAULT LAYERS =====
map.addLayer(clusterLayer);
map.addLayer(heatProxy);

// ===== INIT =====
loadLiveSessions();
</script>
</body>
</html>
