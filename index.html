<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mine Risk Heatmap — Kharkiv Oblast</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<!-- TimeDimension CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-timedimension@1.1.0/dist/leaflet.timedimension.control.min.css" />

<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100vh; }
  .legend { background:#fff; padding:8px 10px; border-radius:6px; line-height:1.4; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .legend i { width:14px; height:14px; display:inline-block; margin-right:6px; opacity:.85; }
  .search-control { background:#fff; padding:8px 10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .search-control input, .search-control button, .search-control label { display:block; margin-bottom:6px; width:100%; }
  .search-control input, .search-control button { padding:6px; border:1px solid #ccc; border-radius:4px; }
</style>
</head>
<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- ВАЖЛИВО: залежність для TimeDimension -->
<script src="https://cdn.jsdelivr.net/npm/iso8601-js-period@0.2.1/iso8601.min.js"></script>
<!-- TimeDimension -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-timedimension@1.1.0/dist/leaflet.timedimension.min.js"></script>

<!-- Heatmap -->
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
// ====== CONFIG ======
const APPS_SCRIPT_DATA_URL =
  "https://script.google.com/macros/s/AKfycbyiDID7u07n2C8rDc_DIfYYVn6OS-0FaAoLCpNl3jDyi7A2bpZiKJfj62TiwYLvjsWFvw/exec";

const SETTLEMENTS_GEOJSON_URL = "data/kharkiv_settlements_points.geojson";

// ====== HELPERS ======
function normalizeText(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[`ʼ']/g, "’")
    .replace(/\s+/g, " ");
}

function makeKey(raion, hromada, settlement) {
  return [
    normalizeText(raion),
    normalizeText(hromada),
    normalizeText(settlement)
  ].join("||");
}

function safeNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function toIsoDate(value) {
  if (!value) return null;

  // якщо вже ISO
  const parsed = new Date(value);
  if (!isNaN(parsed.getTime())) return parsed.toISOString();

  // якщо формат YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(String(value))) {
    return new Date(value + "T00:00:00").toISOString();
  }

  return null;
}

// ====== 1) MAP CORE ======
var hasTD = (typeof L.TimeDimension !== 'undefined');

var map = L.map('map', hasTD ? {
  zoomControl: true,
  timeDimension: true,
  timeDimensionControl: true,
  timeDimensionOptions: {
    timeInterval: "2022-06-01/2026-12-31",
    period: "P1M"
  }
} : { zoomControl:true }).setView([49.9935, 36.2304], 8);

var kharkivBounds = L.latLngBounds([[48.5, 34.8], [50.6, 38.3]]);
map.fitBounds(kharkivBounds);

// ====== BASE LAYERS ======
var osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom:19, crossOrigin:true, attribution:'&copy; OpenStreetMap' }
);

var carto = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  { maxZoom:20, crossOrigin:true, attribution:'&copy; OpenStreetMap &copy; CARTO' }
);

var osmde = L.tileLayer(
  'https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',
  { maxZoom:19, crossOrigin:true, attribution:'&copy; OpenStreetMap' }
);

osm.addTo(map);

function fallback(fromLayer, toLayer){
  function once(){
    fromLayer.off('tileerror', once);
    if (map.hasLayer(fromLayer)) map.removeLayer(fromLayer);
    toLayer.addTo(map);
  }
  fromLayer.on('tileerror', once);
}
fallback(osm, carto);
fallback(carto, osmde);

var baseLayers = {
  'OpenStreetMap': osm,
  'Carto Voyager': carto,
  'OSM.de': osmde
};

// ====== 2) CHOROPLETH (демо-шар поки залишаємо) ======
function color(v){
  return v > 5000 ? '#800026' :
         v > 1000 ? '#BD0026' :
         v > 500  ? '#E31A1C' :
         v > 100  ? '#FC4E2A' :
         v > 50   ? '#FD8D3C' :
         v > 10   ? '#FEB24C' : '#FFEDA0';
}

var choroplethLayer = L.layerGroup();

fetch('data/admin_agg.geojson')
  .then(function(r){ return r.json(); })
  .then(function(geo){
    var layer = L.geoJSON(geo, {
      style: function(f){
        var sumVal = (f.properties && f.properties.sum_participants != null)
          ? f.properties.sum_participants
          : 0;

        return {
          weight: 1,
          color: '#999',
          fillOpacity: 0.7,
          fillColor: color(sumVal || 0)
        };
      },
      onEachFeature: function(f,l){
        var p = f.properties || {};
        var sumVal = (p.sum_participants != null) ? p.sum_participants : 0;
        l.bindPopup(
          '<b>' + (p.hromada || 'Громада') + '</b><br>' +
          'Осіб за період: ' + sumVal +
          '<br><small>Демо-полігон</small>'
        );
        l.on('mouseover', function(){ l.setStyle({weight:2, color:'#555'}); });
        l.on('mouseout',  function(){ l.setStyle({weight:1, color:'#999'}); });
      }
    });
    choroplethLayer.addLayer(layer);
  })
  .catch(console.error);

// ====== 3) LIVE POINTS ======
var clusterLayer = L.markerClusterGroup();
var timePointsGroup = L.layerGroup();
var heatLayer = null;

var allSessions = [];
var settlementsLookup = new Map();

function buildSettlementsLookup(settlementsGeo) {
  settlementsLookup.clear();

  (settlementsGeo.features || []).forEach(function(f){
    const p = f.properties || {};
    const geom = f.geometry || {};
    const coords = geom.coordinates;

    if (!coords || geom.type !== "Point") return;

    const key = makeKey(p.raion, p.hromada, p.settlement);

    settlementsLookup.set(key, {
      lat: coords[1],
      lon: coords[0],
      properties: p
    });
  });
}

function convertRowsToFeatures(rows) {
  const features = [];

  rows.forEach(function(row){
    const key = makeKey(row.raion, row.hromada, row.settlement);
    const settlementPoint = settlementsLookup.get(key);

    if (!settlementPoint) {
      console.warn("Не знайдено населений пункт у довіднику:", row);
      return;
    }

    const participantsTotal = safeNumber(row.participants_total);
    const participantsU18 = safeNumber(row.participants_u18);
    const participants18Plus = safeNumber(row.participants_18plus);
    const datetimeIso = toIsoDate(row.session_date) || toIsoDate(row.created_at);

    features.push({
      type: "Feature",
      geometry: {
        type: "Point",
        coordinates: [settlementPoint.lon, settlementPoint.lat]
      },
      properties: {
        created_at: row.created_at || "",
        datetime: datetimeIso || "",
        session_date: row.session_date || "",
        raion: row.raion || "",
        hromada: row.hromada || "",
        settlement: row.settlement || "",
        instructor_1: row.instructor_1 || "",
        instructor_2: row.instructor_2 || "",
        participants_total: participantsTotal,
        participants_u18: participantsU18,
        participants_18plus: participants18Plus,
        notes: row.notes || ""
      }
    });
  });

  return features;
}

function buildLayers(features){
  clusterLayer.clearLayers();
  timePointsGroup.clearLayers();

  if (heatLayer) {
    heatLayer.setLatLngs([]);
  }

  var geo = { type:'FeatureCollection', features: features };

  // MARKERS / CLUSTER
  var markers = L.geoJSON(geo, {
    pointToLayer: function(f, latlng){
      return L.marker(latlng);
    },
    onEachFeature: function(f, layer){
      var p = f.properties || {};

      var instructors = [p.instructor_1, p.instructor_2]
        .filter(Boolean)
        .join(", ");

      var html =
        '<b>' + (p.settlement || 'Населений пункт') + '</b><br>' +
        (p.hromada || '—') + (p.raion ? ', ' + p.raion : '') + '<br>' +
        'Дата: ' + (p.session_date || '—') + '<br>' +
        'Інструктори: ' + (instructors || '—') + '<br>' +
        'Усього учасників: ' + (p.participants_total ?? '—') + '<br>' +
        'До 18: ' + (p.participants_u18 ?? '—') + '<br>' +
        '18+: ' + (p.participants_18plus ?? '—') +
        (p.notes ? '<br>Примітки: ' + p.notes : '');

      layer.bindPopup(html);
    }
  });

  clusterLayer.addLayer(markers);

  // TIME DIMENSION
  if (hasTD){
    var featuresWithTime = features
      .filter(function(f){ return f.properties && f.properties.datetime; })
      .map(function(f){
        var copy = JSON.parse(JSON.stringify(f));
        copy.properties.time = copy.properties.datetime;
        return copy;
      });

    var timeGeo = L.geoJSON(
      { type:'FeatureCollection', features: featuresWithTime },
      {
        pointToLayer: function(f, latlng){
          return L.circleMarker(latlng, {
            radius: 6,
            color: '#0a84ff',
            fillColor: '#0a84ff',
            fillOpacity: 0.8
          });
        }
      }
    );

    var td = L.timeDimension.layer.geoJson(timeGeo, {
      updateTimeDimension: true,
      addlastPoint: false,
      duration: 'P15D',
      waitForReady: true
    });

    timePointsGroup.addLayer(td);
  }

  // HEATMAP
  if (typeof L.heatLayer !== 'undefined'){
    var heatData = features.map(function(f){
      var c = f.geometry && f.geometry.coordinates;
      var p = f.properties || {};

      if (!c) return null;

      var intensity = Math.min(1, safeNumber(p.participants_total) / 60);
      return [c[1], c[0], intensity];
    }).filter(Boolean);

    if (!heatLayer) {
      heatLayer = L.heatLayer(heatData, {
        radius: 25,
        blur: 15,
        maxZoom: 12
      });
    } else {
      heatLayer.setLatLngs(heatData);
    }
  }
}

function applyFilters(){
  var txt = (document.getElementById('search-input').value || '').trim().toLowerCase();
  var sVal = document.getElementById('start-date').value;
  var eVal = document.getElementById('end-date').value;

  var sDate = sVal ? new Date(sVal + 'T00:00:00') : null;
  var eDate = eVal ? new Date(eVal + 'T23:59:59.999') : null;

  var filtered = allSessions.filter(function(f){
    var p = f.properties || {};

    var matchSearch =
      !txt ||
      (p.hromada && p.hromada.toLowerCase().includes(txt)) ||
      (p.raion && p.raion.toLowerCase().includes(txt)) ||
      (p.settlement && p.settlement.toLowerCase().includes(txt)) ||
      (p.instructor_1 && p.instructor_1.toLowerCase().includes(txt)) ||
      (p.instructor_2 && p.instructor_2.toLowerCase().includes(txt));

    var d = p.datetime ? new Date(p.datetime) : null;
    var validDate = d && !isNaN(d.getTime());
    var okS = !sDate || (d && d >= sDate);
    var okE = !eDate || (d && d <= eDate);

    return matchSearch && (!p.datetime || validDate) && okS && okE;
  });

  buildLayers(filtered);
}

async function loadLiveSessions(){
  try {
    const [settlementsResponse, sessionsResponse] = await Promise.all([
      fetch(SETTLEMENTS_GEOJSON_URL + '?nocache=' + Date.now()),
      fetch(APPS_SCRIPT_DATA_URL + '?nocache=' + Date.now())
    ]);

    if (!settlementsResponse.ok) {
      throw new Error("Не вдалося завантажити довідник населених пунктів");
    }

    if (!sessionsResponse.ok) {
      throw new Error("Не вдалося завантажити живі дані з Google Sheets");
    }

    const settlementsGeo = await settlementsResponse.json();
    const rows = await sessionsResponse.json();

    buildSettlementsLookup(settlementsGeo);
    const features = convertRowsToFeatures(Array.isArray(rows) ? rows : []);

    allSessions = features;
    buildLayers(allSessions);
  } catch (error) {
    console.error(error);
  }
}

// ====== 4) SEARCH / FILTER CONTROL ======
var searchControl = L.control({ position:'topright' });

searchControl.onAdd = function(){
  var div = L.DomUtil.create('div','search-control');
  div.innerHTML =
    '<input type="text" id="search-input" placeholder="Пошук по району / громаді / НП / інструктору" />' +
    '<label>Від: <input type="date" id="start-date" /></label>' +
    '<label>До: <input type="date" id="end-date" /></label>' +
    '<button id="filter-btn" style="cursor:pointer;">Фільтрувати</button>' +
    '<button id="refresh-btn" style="cursor:pointer;">Оновити дані</button>';

  L.DomEvent.disableClickPropagation(div);
  return div;
};

searchControl.addTo(map);

setTimeout(function(){
  document.getElementById('filter-btn').addEventListener('click', applyFilters);
  document.getElementById('refresh-btn').addEventListener('click', function(){
    loadLiveSessions().then(applyFilters);
  });
}, 0);

// ====== 5) LAYERS CONTROL ======
var overlays = {
  'Кластер точок': clusterLayer,
  'Демо-полігони громад': choroplethLayer
};

if (hasTD) {
  overlays['Точки у часі (Time slider)'] = timePointsGroup;
}

if (typeof L.heatLayer !== 'undefined') {
  var proxy = L.layerGroup();

  proxy.on('add', function(){
    if (heatLayer) heatLayer.addTo(map);
  });

  proxy.on('remove', function(){
    if (heatLayer) map.removeLayer(heatLayer);
  });

  overlays['Heatmap Харківщини (бенефіціари)'] = proxy;
  map.addLayer(proxy);
}

L.control.layers(baseLayers, overlays, { collapsed:false }).addTo(map);

// ====== 6) DEFAULT LAYERS ======
map.addLayer(clusterLayer);
if (hasTD) map.addLayer(timePointsGroup);

// ====== 7) LEGEND ======
var legend = L.control({position:'bottomright'});
legend.onAdd = function(){
  var div = L.DomUtil.create('div','legend');
  var grades = [0,10,50,100,500,1000,5000];
  div.innerHTML += '<b>Осіб за період</b><br>';

  for (var i = 0; i < grades.length; i++){
    var from = grades[i];
    var to = grades[i + 1];
    var c = color(from + 0.1);

    div.innerHTML +=
      '<i style="background:' + c + '"></i> ' +
      from + (to ? '&ndash;' + to : '+') + '<br>';
  }

  return div;
};
legend.addTo(map);

// ====== 8) INITIAL LOAD ======
loadLiveSessions();
</script>
</body>
</html>
