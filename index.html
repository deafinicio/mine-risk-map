<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mine Risk Heatmap — Kharkiv Oblast</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />

<style>
html, body { height:100%; margin:0; }
#map { height:100vh; }

.control-box {
  background:#fff;
  padding:8px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
  font-family:sans-serif;
  font-size:13px;
}

.icon-control button {
  display:block;
  margin-bottom:6px;
  width:34px;
  height:34px;
  border:none;
  border-radius:6px;
  background:#fff;
  cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
  font-size:16px;
}

.hidden { display:none; }
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>

<script>
// ===== CONFIG =====
const APPS_SCRIPT_DATA_URL = "ТВОЄ_API";
const SETTLEMENTS_GEOJSON_URL = "data/kharkiv_settlements_points.geojson";

// ===== MAP =====
var map = L.map("map").setView([49.9,36.2],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== LAYERS =====
var clusterLayer = L.markerClusterGroup();
var heatLayer = null;
var heatProxy = L.layerGroup();

var allSessions = [];
var currentFeatures = [];

const heatSettings = {
  radius:40,
  blur:36,
  minOpacity:0.35,
  exponent:0.4,
  minFloor:0.1,
  purpleBoost:1.4
};

// ===== BUILD =====
function buildLayers(features){
  currentFeatures = features;
  clusterLayer.clearLayers();

  var max = 0;
  features.forEach(f=>{
    max = Math.max(max, f.val);
  });
  if(max<=0) max=1;

  var heatData = features.map(f=>{
    let i = Math.pow(f.val/max, heatSettings.exponent);
    i = Math.max(heatSettings.minFloor, Math.min(1,i));
    return [f.lat,f.lng,i];
  });

  if(!heatLayer){
    heatLayer = L.heatLayer(heatData,{
      radius:heatSettings.radius,
      blur:heatSettings.blur,
      minOpacity:heatSettings.minOpacity,
      gradient:{
        0.05:"#6a00ff",
        0.2:"#6a00ff",
        0.4:"#3fb8ff",
        0.6:"#4dff88",
        0.8:"#ffe14a",
        1:"#ff3b30"
      }
    });
  } else {
    heatLayer.setLatLngs(heatData);
  }

  if(map.hasLayer(heatProxy)){
    if(!map.hasLayer(heatLayer)){
      heatLayer.addTo(map);
    }
  }
}

// ===== ICON CONTROL =====
var icons = L.control({position:"topleft"});
icons.onAdd = function(){
  var div = L.DomUtil.create("div","icon-control");

  div.innerHTML = `
    <button id="btn-settings">⚙</button>
    <button id="btn-export">📷</button>
    <button id="btn-filters">🧾</button>
  `;

  L.DomEvent.disableClickPropagation(div);
  return div;
};
icons.addTo(map);

// ===== FILTER PANEL =====
var filterControl = L.control({position:"topright"});
filterControl.onAdd = function(){
  var div = L.DomUtil.create("div","control-box");
  div.id="filters";

  div.innerHTML = `
    <input id="search" placeholder="Пошук">
    <button id="apply">Застосувати</button>
  `;

  return div;
};
filterControl.addTo(map);

// ===== SETTINGS PANEL =====
var settingsControl = L.control({position:"topleft"});
settingsControl.onAdd = function(){
  var div = L.DomUtil.create("div","control-box hidden");
  div.id="settings";

  div.innerHTML = `
    <b>Heatmap</b><br>

    Radius <input type="range" id="r" min="10" max="80" value="40">
    Blur <input type="range" id="b" min="10" max="60" value="36">
    Purple <input type="range" id="p" min="0.5" max="2.5" step="0.1" value="1.4">
  `;

  return div;
};
settingsControl.addTo(map);

// ===== EVENTS =====
document.addEventListener("click",e=>{

  if(e.target.id==="btn-settings"){
    document.getElementById("settings").classList.toggle("hidden");
  }

  if(e.target.id==="btn-filters"){
    document.getElementById("filters").classList.toggle("hidden");
  }

  if(e.target.id==="btn-export"){
    leafletImage(map,function(err,canvas){
      var link=document.createElement("a");
      link.download="map.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  }

});

// sliders
document.addEventListener("input",e=>{
  if(e.target.id==="r") heatSettings.radius=+e.target.value;
  if(e.target.id==="b") heatSettings.blur=+e.target.value;
  if(e.target.id==="p") heatSettings.purpleBoost=+e.target.value;

  if(currentFeatures.length){
    map.removeLayer(heatLayer);
    heatLayer=null;
    buildLayers(currentFeatures);
  }
});

// ===== DEMO DATA (поки не чіпаємо твої API) =====
var demo = [
  {lat:49.9,lng:36.2,val:200},
  {lat:49.5,lng:36.3,val:500},
  {lat:49.7,lng:35.8,val:100}
];

map.addLayer(clusterLayer);
map.addLayer(heatProxy);

buildLayers(demo);
</script>
</body>
</html>
